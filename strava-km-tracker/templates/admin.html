<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Bike KM Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🚴 Admin</h1>
    <a href="/" class="btn btn-ghost">← Public page</a>
  </header>

  <div class="admin-box">
    {% if connected %}
    <div class="status connected">Strava connected</div>
    <p>Your activities are being fetched from Strava.</p>
    <div class="admin-actions">
      <form action="/admin/refresh" method="post">
        <button class="btn btn-secondary">Sync latest rides</button>
      </form>
      <form action="/admin/logout-strava" method="post">
        <button class="btn btn-danger">Disconnect Strava</button>
      </form>
    </div>
    {% else %}
    <div class="status disconnected">Not connected</div>
    <p>Connect your Strava account to start showing stats on the public page.</p>
    <a href="{{ auth_url }}" class="btn btn-strava">Connect with Strava</a>
    {% endif %}
  </div>
</body>
</html>
